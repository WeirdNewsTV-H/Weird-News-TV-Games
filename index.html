<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weird News TV | Games</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0b0711;
            color: #f1ecf7;
            line-height: 1.6;
            padding-top: 80px;
        }

        header {
            background: #130d1e;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            color: #a09bb0;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .nav-link.active, .nav-link:hover {
            color: #ff0055;
        }

        .subscribe-btn {
            background: #ff0055;
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }

        .arcade-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .arcade-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .arcade-title h1 {
            font-size: 2.5rem;
            color: #ffffff;
            border-left: 4px solid #ff0055;
            padding-left: 15px;
            margin-bottom: 5px;
        }

        .game-links-list {
            background: #130d1e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-item-link {
            display: inline-flex;
            align-items: center;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 4px solid #ff0055;
            transition: all 0.2s ease;
            gap: 12px;
        }

        .game-item-link:hover {
            background: #ff0055;
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #07040b;
            color: #5d586e;
            font-size: 0.9rem;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <a href="WeirdNewsTVWebsite.html" class="logo">WEIRD NEWS TV</a>
        <div class="nav-container">
            <a href="games.html" class="nav-link active">Games</a>
            <a href="https://youtube.com/@WeirdNewsTVOfficial" target="_blank" class="subscribe-btn">Subscribe</a>
        </div>
    </header>

    <main class="arcade-container">
        <div class="arcade-header">
            <div class="arcade-title">
                <h1>🎮 Weird News TV Games</h1>
                <p style="color: #a09bb0;">Play games created by Weird News TV.</p>
            </div>
        </div>
        
        <div class="game-links-list">
            <a href="https://weirdnewstv-h.github.io/YouTuber-Clicker/" target="_blank" class="game-item-link">
                📺 YouTuber Clicker
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Weird News TV</p>
    </footer>

</body>
</html>
