<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weird News TV | Games</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0b0711;
            color: #f1ecf7;
            line-height: 1.6;
            padding-top: 80px;
        }

        header {

            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            color: #a09bb0;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

            color: #ff0055;
        }

            color: #fff;

            font-weight: bold;
        }

            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

            margin-bottom: 5px;
        }
